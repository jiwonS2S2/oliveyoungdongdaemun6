<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>K-Beauty Guide</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#cceefa;touch-action:manipulation;}
  body{position:fixed;inset:0;font-family:system-ui,sans-serif;}
  .page{position:fixed;inset:0;display:none;background:#cceefa;overflow:hidden;}
  .page.active{display:block;}
  /* Safari 하단 주소창을 피하면서 위/좌우는 붙임. 이미지 자체는 PNG 그대로, 표시만 가로로 늘림 */
  .frame{
    position:absolute;left:0;top:0;width:100vw;
    height:calc(var(--app-height, 100dvh) - var(--bottom-gap, 82px));
    min-height:560px;overflow:hidden;background:#cceefa;
  }
  @media (display-mode: standalone){.frame{height:var(--app-height,100dvh)}}
  .slide-img{width:100%;height:100%;display:block;object-fit:fill;object-position:center top;user-select:none;-webkit-user-drag:none;}
  .hot{position:absolute;display:block;background:rgba(255,255,255,0);border:0;cursor:pointer;z-index:5;}
  /* Start pages */
  .main-click{left:10%;top:80%;width:80%;height:10%;}
  .lang-zh{left:3%;top:92%;width:31%;height:8%;}
  .lang-en{left:35%;top:92%;width:30%;height:8%;}
  .lang-ja{left:66%;top:92%;width:32%;height:8%;}
  /* Product pages */
  .back{left:0%;top:94.8%;width:27%;height:5.2%;}
</style>
</head>
<body>
  <section class="page active" id="p1"><div class="frame"><img class="slide-img" src="assets/page1.jpg" alt="English start"><button class="hot main-click" onclick="go(4)" aria-label="open English"></button><button class="hot lang-zh" onclick="go(3)" aria-label="Chinese"></button><button class="hot lang-en" onclick="go(1)" aria-label="English"></button><button class="hot lang-ja" onclick="go(2)" aria-label="Japanese"></button></div></section>
  <section class="page" id="p2"><div class="frame"><img class="slide-img" src="assets/page2.jpg" alt="Japanese start"><button class="hot main-click" onclick="go(5)" aria-label="open Japanese"></button><button class="hot lang-zh" onclick="go(3)" aria-label="Chinese"></button><button class="hot lang-en" onclick="go(1)" aria-label="English"></button><button class="hot lang-ja" onclick="go(2)" aria-label="Japanese"></button></div></section>
  <section class="page" id="p3"><div class="frame"><img class="slide-img" src="assets/page3.jpg" alt="Chinese start"><button class="hot main-click" onclick="go(6)" aria-label="open Chinese"></button><button class="hot lang-zh" onclick="go(3)" aria-label="Chinese"></button><button class="hot lang-en" onclick="go(1)" aria-label="English"></button><button class="hot lang-ja" onclick="go(2)" aria-label="Japanese"></button></div></section>
  <section class="page" id="p4"><div class="frame"><img class="slide-img" src="assets/page4.png" alt="English products"><button class="hot back" onclick="go(1)" aria-label="back"></button></div></section>
  <section class="page" id="p5"><div class="frame"><img class="slide-img" src="assets/page5.png" alt="Japanese products"><button class="hot back" onclick="go(2)" aria-label="back"></button></div></section>
  <section class="page" id="p6"><div class="frame"><img class="slide-img" src="assets/page6.png" alt="Chinese products"><button class="hot back" onclick="go(3)" aria-label="back"></button></div></section>
<script>
function setHeights(){
  const h = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', h + 'px');
  // Safari 하단 주소창 위로 버튼이 보이게 하는 최소 여백. 화면이 작아도 너무 줄지 않게 고정.
  const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  document.documentElement.style.setProperty('--bottom-gap', standalone ? '0px' : '74px');
}
function go(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('p'+n).classList.add('active');
  setHeights();
}
setHeights();
window.addEventListener('resize', setHeights);
if(window.visualViewport){window.visualViewport.addEventListener('resize', setHeights); window.visualViewport.addEventListener('scroll', setHeights);}
</script>
</body>
</html>
