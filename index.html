<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#cdefff" />
  <title>K-Beauty Guide</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #cdefff; }
    body { position: fixed; inset: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; touch-action: manipulation; overscroll-behavior: none; }
    #app { position: fixed; inset: 0; width: 100vw; height: 100dvh; min-height: 100svh; overflow: hidden; background: #cdefff; }
    .page { position: absolute; inset: 0; width: 100%; height: 100%; display: none; overflow: hidden; background: #cdefff; }
    .page.active { display: block; }
    .page-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; object-position: center center; user-select: none; -webkit-user-drag: none; }
    .hotspot { position: absolute; display: block; border: 0; background: transparent; cursor: pointer; padding: 0; margin: 0; }
    .main-click { left: 8%; right: 8%; top: 80.5%; height: 10.5%; }
    .lang-cn { left: 3%; bottom: 0.5%; width: 29%; height: 6.8%; }
    .lang-en { left: 35.5%; bottom: 0.5%; width: 29%; height: 6.8%; }
    .lang-jp { right: 3%; bottom: 0.5%; width: 29%; height: 6.8%; }
    .back { left: 1.5%; bottom: 0.6%; width: 27%; height: 5.5%; }
  </style>
</head>
<body>
<div id="app" aria-label="K-Beauty Guide">
  <section class="page active" id="p1"><img class="page-img" src="assets/page1.png" alt="English main"><button class="hotspot main-click" data-go="p4" aria-label="Open English list"></button><button class="hotspot lang-cn" data-go="p3" aria-label="Chinese"></button><button class="hotspot lang-en" data-go="p1" aria-label="English"></button><button class="hotspot lang-jp" data-go="p2" aria-label="Japanese"></button></section>
  <section class="page" id="p2"><img class="page-img" src="assets/page2.png" alt="Japanese main"><button class="hotspot main-click" data-go="p5" aria-label="Open Japanese list"></button><button class="hotspot lang-cn" data-go="p3" aria-label="Chinese"></button><button class="hotspot lang-en" data-go="p1" aria-label="English"></button><button class="hotspot lang-jp" data-go="p2" aria-label="Japanese"></button></section>
  <section class="page" id="p3"><img class="page-img" src="assets/page3.png" alt="Chinese main"><button class="hotspot main-click" data-go="p6" aria-label="Open Chinese list"></button><button class="hotspot lang-cn" data-go="p3" aria-label="Chinese"></button><button class="hotspot lang-en" data-go="p1" aria-label="English"></button><button class="hotspot lang-jp" data-go="p2" aria-label="Japanese"></button></section>
  <section class="page" id="p4"><img class="page-img" src="assets/page4.png" alt="English product list"><button class="hotspot back" data-go="p1" aria-label="Back"></button></section>
  <section class="page" id="p5"><img class="page-img" src="assets/page5.png" alt="Japanese product list"><button class="hotspot back" data-go="p2" aria-label="Back"></button></section>
  <section class="page" id="p6"><img class="page-img" src="assets/page6.png" alt="Chinese product list"><button class="hotspot back" data-go="p3" aria-label="Back"></button></section>
</div>
<script>
  const pages = [...document.querySelectorAll('.page')];
  function show(id) {
    pages.forEach(p => p.classList.toggle('active', p.id === id));
    window.scrollTo(0,0);
  }
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-go]');
    if (btn) show(btn.dataset.go);
  }, {passive: true});
  document.addEventListener('touchmove', e => e.preventDefault(), {passive: false});
</script>
</body>
</html>
