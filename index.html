<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#cceefa" />
<title>K-Beauty Guide</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#cceefa;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}
  body{position:fixed;inset:0;touch-action:manipulation;}
  #app{position:fixed;inset:0;display:flex;align-items:flex-start;justify-content:center;background:#cceefa;overflow:hidden;padding:0;}
  .stage{position:relative;width:100vw;height:calc(100dvh - 130px);max-height:calc(100dvh - 130px);min-height:560px;overflow:hidden;background:#cceefa;margin-top:0;}
  .slide{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;display:block;user-select:none;-webkit-user-drag:none;}
  .hot{position:absolute;border:0;background:rgba(255,255,255,0);cursor:pointer;z-index:5;}
  .hot:focus{outline:none;}
  /* language buttons, relative to stretched image area */
  .cn{left:3.5%;top:92.6%;width:31%;height:6.3%;}
  .en{left:35.5%;top:92.6%;width:29%;height:6.3%;}
  .jp{left:65.5%;top:92.6%;width:31%;height:6.3%;}
  .mainclick{left:10%;top:80.2%;width:80%;height:10.5%;}
  .back{left:0%;top:95.4%;width:27%;height:4.6%;}
  @supports not (height: 100dvh){.stage{height:calc(var(--vh,1vh)*100 - 130px);max-height:calc(var(--vh,1vh)*100 - 130px);}}
  @media (max-height:720px){.stage{height:calc(100dvh - 105px);max-height:calc(100dvh - 105px);min-height:520px;}}
</style>
</head>
<body>
<div id="app"><div class="stage" id="stage">
  <img id="slide" class="slide" src="assets/page1.jpg" alt="K-Beauty guide" />
  <button class="hot mainclick" id="mainclick" aria-label="open"></button>
  <button class="hot cn" data-go="6" aria-label="中文"></button>
  <button class="hot en" data-go="4" aria-label="English"></button>
  <button class="hot jp" data-go="5" aria-label="日本語"></button>
  <button class="hot back" id="back" aria-label="Back"></button>
</div></div>
<script>
(function(){
  const img=document.getElementById('slide');
  const main=document.getElementById('mainclick');
  const back=document.getElementById('back');
  const langBtns=[...document.querySelectorAll('[data-go]')];
  let page=1;
  const firstByProduct={1:4,2:5,3:6};
  function setVH(){document.documentElement.style.setProperty('--vh', `${window.innerHeight*0.01}px`)}
  setVH(); addEventListener('resize',setVH,{passive:true}); addEventListener('orientationchange',()=>setTimeout(setVH,200),{passive:true});
  function go(p){
    page=Number(p)||1; if(page<1||page>6) page=1;
    img.src=`assets/page${page}.jpg`;
    history.replaceState(null,'',`#${page}`);
    const intro=page<=3;
    main.style.display=intro?'block':'none';
    langBtns.forEach(b=>b.style.display=intro?'block':'none');
    back.style.display=intro?'none':'block';
  }
  main.onclick=()=>go(firstByProduct[page]||4);
  back.onclick=()=>go(1);
  langBtns.forEach(b=>b.onclick=()=>go(b.dataset.go));
  const start=location.hash.replace('#',''); go(start||1);
})();
</script>
</body>
</html>
