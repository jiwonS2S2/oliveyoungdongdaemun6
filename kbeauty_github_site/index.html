<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#cceeff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="format-detection" content="telephone=no" />
  <title>K-Beauty Shopping Guide</title>
  <link rel="preload" as="image" href="assets/page1.png" />
  <link rel="preload" as="image" href="assets/page2.png" />
  <link rel="preload" as="image" href="assets/page3.png" />
  <link rel="preload" as="image" href="assets/page4.png" />
  <link rel="preload" as="image" href="assets/page5.png" />
  <link rel="preload" as="image" href="assets/page6.png" />
  <style>
    :root { --page-ratio: 0.460958; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #cceeff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { position: fixed; inset: 0; touch-action: manipulation; overscroll-behavior: none; }
    .screen { position: fixed; inset: 0; display: none; place-items: center; background: #cceeff; }
    .screen.active { display: grid; }
    .phone { position: relative; height: 100dvh; height: 100vh; width: min(100vw, calc(100dvh * var(--page-ratio))); max-width: 100vw; overflow: hidden; background: #cceeff; }
    .phone img { width: 100%; height: 100%; object-fit: fill; display: block; user-select: none; -webkit-user-drag: none; }
    .tap { position: absolute; display: block; border: 0; background: transparent; cursor: pointer; text-indent: -9999px; overflow: hidden; }
    .main-tap { left: 8%; top: 81.8%; width: 84%; height: 10.5%; }
    .lang-cn { left: 3.5%; bottom: 0.4%; width: 29.5%; height: 5.8%; }
    .lang-en { left: 35.0%; bottom: 0.4%; width: 30.0%; height: 5.8%; }
    .lang-jp { left: 67.0%; bottom: 0.4%; width: 29.5%; height: 5.8%; }
    .back { left: 2.0%; bottom: 0.2%; width: 25%; height: 6.0%; }
  </style>
</head>
<body>
  <main aria-label="K-Beauty Shopping Guide">
    <section id="enCover" class="screen active"><div class="phone"><img src="assets/page1.png" alt="English K-Beauty cover"><a class="tap main-tap" href="#enList">Open English list</a><a class="tap lang-cn" href="#cnCover">中文</a><a class="tap lang-en" href="#enCover">English</a><a class="tap lang-jp" href="#jpCover">日本語</a></div></section>
    <section id="jpCover" class="screen"><div class="phone"><img src="assets/page2.png" alt="Japanese K-Beauty cover"><a class="tap main-tap" href="#jpList">Open Japanese list</a><a class="tap lang-cn" href="#cnCover">中文</a><a class="tap lang-en" href="#enCover">English</a><a class="tap lang-jp" href="#jpCover">日本語</a></div></section>
    <section id="cnCover" class="screen"><div class="phone"><img src="assets/page3.png" alt="Chinese K-Beauty cover"><a class="tap main-tap" href="#cnList">Open Chinese list</a><a class="tap lang-cn" href="#cnCover">中文</a><a class="tap lang-en" href="#enCover">English</a><a class="tap lang-jp" href="#jpCover">日本語</a></div></section>
    <section id="enList" class="screen"><div class="phone"><img src="assets/page4.png" alt="English product list"><a class="tap back" href="#enCover">Back</a></div></section>
    <section id="jpList" class="screen"><div class="phone"><img src="assets/page5.png" alt="Japanese product list"><a class="tap back" href="#jpCover">Back</a></div></section>
    <section id="cnList" class="screen"><div class="phone"><img src="assets/page6.png" alt="Chinese product list"><a class="tap back" href="#cnCover">Back</a></div></section>
  </main>
  <script>
    const screens = [...document.querySelectorAll('.screen')];
    function showFromHash() {
      const id = location.hash.replace('#','') || 'enCover';
      const target = document.getElementById(id) || document.getElementById('enCover');
      screens.forEach(s => s.classList.toggle('active', s === target));
    }
    window.addEventListener('hashchange', showFromHash, { passive: true });
    showFromHash();
  </script>
</body>
</html>
